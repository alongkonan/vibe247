<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE 24 - คลื่นเพลงฮิต...ต่อเนื่อง 24 ชั่วโมง</title>
    
    <!-- แท็ก Meta สำหรับ Redirect อัตโนมัติใน 3 วินาที -->
    <meta http-equiv="refresh" content="3;url=http://vibe24.ct.ws" />
    
    <!-- นำเข้าฟอนต์ตาม CI: Montserrat สำหรับภาษาอังกฤษ และ Prompt สำหรับภาษาไทย -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Prompt:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* ชุดสีของแบรนด์ (Color Palette) */
        :root {
            --vibe-red: #E31E24;
            --vibe-black: #000000;
            --vibe-white: #FFFFFF;
            --secondary-grey: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--vibe-white);
            font-family: 'Prompt', sans-serif;
            color: var(--vibe-black);
            text-align: center;
        }

        /* การตั้งค่าฟอนต์โลโก้ภาษาอังกฤษ */
        .brand-logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 4.5rem;
            letter-spacing: -2px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            margin-bottom: 5px;
        }

        .play-icon {
            color: var(--vibe-red);
            font-size: 3.5rem;
            margin: 0 2px;
            transform: scaleX(0.8);
        }

        .number-24 {
            color: var(--vibe-black);
            font-size: 2.5rem;
            margin-left: 10px;
            position: relative;
        }

        .pulse {
            color: var(--vibe-red);
            font-size: 2.5rem;
            margin-left: 5px;
        }

        /* การตั้งค่าฟอนต์สโลแกนภาษาไทย */
        .slogan {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--vibe-black);
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        /* แอนิเมชัน Loading สี VIBE Red */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--vibe-red);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .redirect-text {
            font-size: 1rem;
            color: var(--secondary-grey);
            font-weight: 400;
        }

        .manual-link {
            font-size: 0.85rem;
            color: var(--secondary-grey);
            margin-top: 15px;
            display: block;
        }

        .manual-link a {
            color: var(--vibe-red);
            text-decoration: none;
            font-weight: 700;
        }

        .manual-link a:hover {
            text-decoration: underline;
        }

        /* รองรับหน้าจอมือถือ */
        @media (max-width: 600px) {
            .brand-logo { font-size: 3.5rem; }
            .play-icon { font-size: 2.8rem; }
            .number-24 { font-size: 2rem; }
            .slogan { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- โลโก้จำลองจากข้อความตาม CI -->
    <div class="brand-logo">
        V<span class="play-icon">▶</span>BE<span class="pulse">〰</span><span class="number-24">24</span>
    </div>
    
    <!-- สโลแกน -->
    <div class="slogan">คลื่นเพลงฮิต...ต่อเนื่อง 24 ชั่วโมง</div>

    <!-- ไอคอนกำลังโหลด -->
    <div class="loader"></div>

    <!-- ข้อความแจ้งเตือน -->
    <div class="redirect-text">
        กำลังพาคุณเข้าสู่เว็บไซต์...
        <span class="manual-link">หากระบบไม่เปลี่ยนหน้าอัตโนมัติ <a href="http://vibe24.ct.ws">คลิกที่นี่</a></span>
    </div>

    <!-- JavaScript สำหรับ Redirect ซ้ำเพื่อความชัวร์ (ทำงานหลังผ่านไป 3 วินาที) -->
    <script>
        setTimeout(function() {
            window.location.href = "http://vibe24.ct.ws";
        }, 3000); // 3000 มิลลิวินาที = 3 วินาที
    </script>

</body>
</html>
